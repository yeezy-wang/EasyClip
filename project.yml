name: Clipboard
options:
  bundleIdPrefix: com.clipboard
  deploymentTarget:
    macOS: "10.15"
  xcodeVersion: "11.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "10.15"

targets:
  Clipboard:
    type: application
    platform: macOS
    sources:
      - path: Clipboard
        type: group
    settings:
      base:
        INFOPLIST_FILE: Clipboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clipboard.history
        PRODUCT_NAME: Clipboard
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
    dependencies: []
